<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>视频播放器</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <video id="my-player" controls autoplay muted playsinline>
        <source id="video-source" src="" type="video/mp4">
        您的浏览器不支持 HTML5 视频。
    </video>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoName = urlParams.get('v');

        if (videoName) {
            const player = document.getElementById('my-player');
            const source = document.getElementById('video-source');
            
            // 拼接视频文件的实际路径
            source.src = videoName;
            
            // 重新加载并播放视频
            player.load();
        } else {
            document.body.innerHTML = "<p style='color:white; text-align:center; padding-top:20%;'>请提供视频文件名参数，例如: ?v=video1.mp4</p>";
        }
    </script>

</body>
</html>
